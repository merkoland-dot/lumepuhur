<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snow Spot Logger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>❄ Snow Spot Logger (Eesti aeg)</h2>

<label>Spot ID</label>
<input type="text" id="station">

<label>Date & Time (Eesti aeg)</label>
<input type="datetime-local" id="datetime">

<!-- SNOW -->
<label>Snow Depth (cm)</label>
<input type="number" id="snow" min="0" step="0.1" class="snow-input">

<div class="snow-row">
    <button onclick="changeSnow(-10)">-10</button>
    <button onclick="changeSnow(-5)">-5</button>
    <button onclick="changeSnow(-1)">-1</button>
    <button onclick="changeSnow(1)">+1</button>
    <button onclick="changeSnow(5)">+5</button>
    <button onclick="changeSnow(10)">+10</button>
</div>

<button onclick="setSnowZero()">0 cm</button>

<!-- TEMP -->
<label>Air Temperature (°C)</label>
<input type="number" id="temp" min="-50" max="50" step="0.1" class="temp-input">

<div class="temp-row">
    <button onclick="changeTemp(-5)">-5</button>
    <button onclick="changeTemp(-1)">-1</button>
    <button onclick="changeTemp(1)">+1</button>
    <button onclick="changeTemp(5)">+5</button>
</div>

<div class="temp-row">
    <button onclick="makeNegative()">Make −</button>
    <button onclick="makePositive()">Make +</button>
</div>

<label>Notes</label>
<textarea id="notes"></textarea>

<div id="gpsStatus">GPS: waiting...</div>

<button onclick="addRecord()">Add Spot (Auto GPS)</button>
<button onclick="clearForm()">Clear Form</button>
<button onclick="clearStored()">Clear Stored Data</button>
<button onclick="exportCSV()">Export CSV</button>

<table>
<thead>
<tr>
<th>Spot</th>
<th>DateTime (EE)</th>
<th>Snow</th>
<th>Temp</th>
<th>Lat</th>
<th>Lon</th>
<th>Acc</th>
<th>Del</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script src="app.js"></script>
</body>
</html>
